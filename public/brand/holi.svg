<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 240" role="img" aria-label="Holi mascot">
  <title>Holi</title>
  <defs>
    <!-- Soft crayon grain -->
    <filter id="crayon" x="-10%" y="-10%" width="120%" height="120%">
      <feTurbulence type="fractalNoise" baseFrequency="0.9" numOctaves="3" result="noise"/>
      <feDisplacementMap in="SourceGraphic" in2="noise" scale="1.4" xChannelSelector="R" yChannelSelector="G"/>
    </filter>
  </defs>
  <g filter="url(#crayon)">
    <!-- Halo (gold crayon arc — 871 C screen) -->
    <path
      d="M70 52c8-28 52-28 60 2"
      fill="none"
      stroke="#C9A84C"
      stroke-width="4.5"
      stroke-linecap="round"
      stroke-linejoin="round"
    />
    <!-- Stick arms -->
    <path d="M62 128c-22 8-34 28-38 48" fill="none" stroke="#101820" stroke-width="3.5" stroke-linecap="round"/>
    <path d="M138 128c22 10 32 28 36 46" fill="none" stroke="#101820" stroke-width="3.5" stroke-linecap="round"/>
    <!-- Stick legs -->
    <path d="M88 178c-6 22-10 38-8 52" fill="none" stroke="#101820" stroke-width="3.5" stroke-linecap="round"/>
    <path d="M112 178c8 20 14 36 18 52" fill="none" stroke="#101820" stroke-width="3.5" stroke-linecap="round"/>
    <!-- Olive body (wobbly ellipse via path — 2685 C) -->
    <path
      d="M100 58
         c28-2 48 18 50 48
         c2 28-10 52-34 62
         c-12 5-26 6-38 2
         c-28-10-42-36-40-62
         c2-28 24-48 62-50z"
      fill="#330072"
      stroke="#101820"
      stroke-width="3"
      stroke-linejoin="round"
    />
    <!-- Leaf nub -->
    <path
      d="M96 56c2-14 8-22 14-26c-2 10 0 18 2 26"
      fill="#1A003D"
      stroke="#101820"
      stroke-width="2"
      stroke-linecap="round"
    />
    <!-- Eye white (slightly uneven) -->
    <ellipse cx="102" cy="118" rx="22" ry="24" fill="#FFFFFF" stroke="#101820" stroke-width="2.5"/>
    <!-- Iris -->
    <circle cx="104" cy="120" r="13" fill="#C9A84C" stroke="#101820" stroke-width="1.5"/>
    <!-- Pupil — Black 6 C -->
    <circle cx="105" cy="121" r="7" fill="#101820"/>
    <!-- Specular -->
    <circle cx="99" cy="114" r="3.2" fill="#FFFFFF"/>
    <!-- Tiny smile crayon tick -->
    <path d="M90 148c6 6 18 8 28 2" fill="none" stroke="#101820" stroke-width="2" stroke-linecap="round"/>
  </g>
</svg>
